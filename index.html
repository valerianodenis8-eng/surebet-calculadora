<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SureBet Pro v2.0</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#121212;
color:#fff;
padding:20px;
}

.container{
max-width:450px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
color:#16a34a;
}

.card{
background:#1f1f1f;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
}

input{
width:100%;
padding:12px;
font-size:18px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:15px;
margin-top:15px;
font-size:18px;
border:none;
border-radius:12px;
background:#16a34a;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#resultado{
margin-top:20px;
padding:15px;
border-radius:10px;
font-size:18px;
background:#222;
}
</style>

</head>

<body>

<div class="container">

<h1>SureBet Pro</h1>

<div class="card">

<label>Monto Total (S/)</label>
<input id="monto" type="number">

<label>Cuota Local</label>
<input id="local" type="number" step="0.01">

<label>Cuota Empate</label>
<input id="empate" type="number" step="0.01">

<label>Cuota Visitante</label>
<input id="visitante" type="number" step="0.01">

<button onclick="calcular()">
Calcular SureBet
</button>

<div id="resultado"></div>

</div>

</div>
