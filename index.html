<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SureBet Pro v3.0</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🎯 SureBet Pro</h1>
        <p>Calculadora Profesional de Surebets</p>
    </div>

    <div class="card">

        <label>Monto Total (S/)</label>
        <input type="number" id="monto" placeholder="100">

        <h3>Mejores cuotas</h3>

        <label>🏠 Local</label>
        <input type="number" step="0.01" id="local">

        <label>🤝 Empate</label>
        <input type="number" step="0.01" id="empate">

        <label>🚩 Visitante</label>
        <input type="number" step="0.01" id="visitante">

        <div class="botones">
            <button class="azul" onclick="buscarMejoresCuotas()">
🔍 Buscar mejores cuotas
</button>

            <button class="verde" onclick="calcularSurebet()">
                Calcular
            </button>

            <button class="gris" onclick="limpiar()">
                Limpiar
            </button>

            <button class="azul" onclick="copiarResultado()">
                Copiar Resultado
            </button>

        </div>

    </div>

    <div class="resultado" id="resultado">

        <h2>Esperando cálculo...</h2>

    </div>

    <div class="card">

        <h2>Comparador de Casas</h2>

        <table>

            <thead>

            <tr>
                <th>Casa</th>
                <th>Local</th>
                <th>Empate</th>
                <th>Visita</th>
            </tr>

            </thead>

            <tbody id="tablaCasas">

            </tbody>

        </table>

    </div>

</div>

<script src="app.js"></script>

<script>

if ("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}

</script>

</body>
</html>
